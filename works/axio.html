<!doctype html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AXIO 作品</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html,
body {
    width: 100%;
    background: #fff;
}

picture {
    display: block;
    width: 100%;
}

picture img {
    display: block;
    width: 100%;
    height: auto;
}

/* 只有手機版才會顯示第 5 張 */
.mobile-only {
    display: block;
}

@media (min-width: 992px) {
    .mobile-only {
        display: none;
    }
}
</style>
</head>

<body>

<!-- 第 1 張：優先載入 -->
<picture>
    <source
        media="(min-width: 992px)"
        srcset="img/axio_01.webp">

    <img
        src="img/axio_m01.webp"
        alt="AXIO 作品第 1 張"
        fetchpriority="high"
        decoding="async">
</picture>

<!-- 第 2 張 -->
<picture>
    <source
        media="(min-width: 992px)"
        srcset="img/axio_02.webp">

    <img
        src="img/axio_m02.webp"
        alt="AXIO 作品第 2 張"
        loading="lazy"
        decoding="async">
</picture>

<!-- 第 3 張 -->
<picture>
    <source
        media="(min-width: 992px)"
        srcset="img/axio_03.webp">

    <img
        src="img/axio_m03.webp"
        alt="AXIO 作品第 3 張"
        loading="lazy"
        decoding="async">
</picture>

<!-- 第 4 張 -->
<picture>
    <source
        media="(min-width: 992px)"
        srcset="img/axio_04.webp">

    <img
        src="img/axio_m04.webp"
        alt="AXIO 作品第 4 張"
        loading="lazy"
        decoding="async">
</picture>

<!-- 手機版才有第 5 張 -->
<picture class="mobile-only">
    <img
        src="img/axio_m05.webp"
        alt="AXIO 作品第 5 張"
        loading="lazy"
        decoding="async">
</picture>

</body>
</html>
